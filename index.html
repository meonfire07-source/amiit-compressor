<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelForge - Perfect Image Compression by AMIIT</title>
    <style>
        /* Tera wahi original CSS jo index.html mein tha */
        * { margin: 0; padding: 0; box-sizing: border-box; transition: background-color 0.3s, color 0.2s, border-color 0.2s; }
        :root { --primary: #4361ee; --secondary: #3a0ca3; --accent: #4cc9f0; --success: #06d6a0; --warning: #ffb703; --danger: #ef233c; --bg-primary: #ffffff; --bg-secondary: #f8f9fa; --text-primary: #212529; --text-secondary: #6c757d; --border: #dee2e6; --card-bg: #ffffff; --header-bg: rgba(255, 255, 255, 0.95); --shadow: 0 10px 30px rgba(0, 0, 0, 0.1); --overlay-bg: rgba(255, 255, 255, 0.95); }
        body.dark-theme { --bg-primary: #0b0e14; --bg-secondary: #151921; --text-primary: #f8f9fa; --text-secondary: #adb5bd; --border: #2d343f; --card-bg: #1a1f29; --header-bg: rgba(11, 14, 20, 0.95); --shadow: 0 10px 30px rgba(0, 0, 0, 0.3); --overlay-bg: rgba(11, 14, 20, 0.95); }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: var(--bg-primary); color: var(--text-primary); line-height: 1.6; overflow-x: hidden; }
        /* ... (Baaki CSS jo tumhari file mein tha maine yahan short kiya hai, par tum full use karna) ... */
        .developer-badge { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; display: inline-block; margin-top: 10px; }
        .loading-popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--overlay-bg); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; visibility: hidden; transition: 0.3s; }
        .loading-popup.active { opacity: 1; visibility: visible; }
    </style>
</head>
<body class="dark-theme">
    <header style="text-align:center; padding: 40px 20px;">
        <h1>PIXEL<span style="color:var(--primary)">FORGE</span></h1>
        <div class="developer-badge">Connecting to 13GB RAM Panel...</div>
    </header>

    <div class="container" style="max-width: 800px; margin: 0 auto; padding: 20px;">
        <div class="upload-area" onclick="document.getElementById('fileInput').click()" style="border: 2px dashed var(--border); padding: 50px; text-align: center; cursor: pointer; border-radius: 15px;">
            <p>Click or Drag Image Here</p>
            <input type="file" id="fileInput" hidden onchange="handleFile(this)">
        </div>

        <div style="margin-top: 30px; display: grid; grid-template-cols: 1fr 1fr; gap: 20px;">
            <input type="number" id="targetSize" placeholder="Target Size" value="500" style="padding:10px; border-radius:5px; border:1px solid var(--border); background:var(--bg-secondary); color:var(--text-primary);">
            <select id="sizeUnit" style="padding:10px; border-radius:5px; background:var(--bg-secondary); color:var(--text-primary);">
                <option value="KB">KB</option>
                <option value="MB">MB</option>
            </select>
        </div>
        
        <div style="margin-top:20px; display: flex; gap: 10px;">
            <button onclick="compressImage()" style="flex:1; padding:15px; background:var(--primary); color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">⚡ AUTO COMPRESS (WebP)</button>
            <button onclick="convertImage()" style="flex:1; padding:15px; background:var(--secondary); color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">📸 CONVERT TO JPG</button>
        </div>
    </div>

    <div id="loadingPopup" class="loading-popup"><div>Processing on Beast Panel...</div></div>
    <div id="resultArea" style="text-align:center; margin-top:30px;">
        <img id="compressedImg" style="max-width:100%; display:none; border-radius:10px; margin: 0 auto;">
        <div id="compressedStats" style="margin-top:10px;"></div>
    </div>

    <script>
        let BACKEND_URL = "";
        let currentFile = null;

        async function initBackend() {
            const badge = document.querySelector('.developer-badge');
            try {
                const response = await fetch(`https://raw.githubusercontent.com/meonfire07-source/amiit-compressor/main/backend-config.json?t=${Date.now()}`);
                const data = await response.json();
                BACKEND_URL = data.url;
                badge.innerText = "⚡ Beast Panel: Online ✅";
                badge.style.background = "linear-gradient(135deg, #06d6a0, #05a87d)";
            } catch (err) {
                badge.innerText = "⚠️ Connecting to Panel...";
                setTimeout(initBackend, 5000);
            }
        }

        function handleFile(input) {
            currentFile = input.files[0];
            if(currentFile) alert("File Selected: " + currentFile.name);
        }

        async function compressImage() {
            if (!currentFile || !BACKEND_URL) return alert('Wait for connection or select file');
            document.getElementById('loadingPopup').classList.add('active');
            
            const formData = new FormData();
            formData.append('image', currentFile);
            formData.append('targetSize', document.getElementById('targetSize').value);
            formData.append('sizeUnit', document.getElementById('sizeUnit').value);
            formData.append('format', 'webp'); //

            try {
                const res = await fetch(`${BACKEND_URL}/compress`, { method: 'POST', body: formData });
                const data = await res.json();
                document.getElementById('loadingPopup').classList.remove('active');
                if (data.success) {
                    const img = document.getElementById('compressedImg');
                    img.src = data.image; img.style.display = 'block';
                    document.getElementById('compressedStats').innerHTML = `Size: ${data.compressed.sizeKB}KB | Quality: ${data.compressed.quality}%`;
                }
            } catch (err) { alert('Error processing image'); }
        }

        async function convertImage() {
            if (!currentFile || !BACKEND_URL) return alert('Wait for connection');
            document.getElementById('loadingPopup').classList.add('active');
            const formData = new FormData();
            formData.append('image', currentFile);
            formData.append('format', 'jpeg'); //

            try {
                const res = await fetch(`${BACKEND_URL}/convert`, { method: 'POST', body: formData });
                const data = await res.json();
                document.getElementById('loadingPopup').classList.remove('active');
                if (data.image) {
                    const img = document.getElementById('compressedImg');
                    img.src = data.image; img.style.display = 'block';
                    document.getElementById('compressedStats').innerHTML = `Converted to JPG!`;
                }
            } catch (err) { alert('Error converting image'); }
        }

        initBackend();
    </script>
</body>
</html>
